GenericLinux_with_Debug:
  extends: .Ubuntu_Image
  stage: build
  cache:
    paths:
      - apt-cache/
      - ccache/
  variables:
    BUILD_TYPE: RelWithDebInfo
    STRIP_BINARIES: "0"
    ARCHIVE_TAR: "0"
  before_script:
    - CI/install_debian_deps.sh gcc_preprocess openmw-deps openmw-deps-dynamic
  script:
    - chmod +x CI/build_openmw_generic_debug.sh
    - CI/build_openmw_generic_debug.sh
  artifacts:
    paths:
      - OpenMW-XBOX-UI
